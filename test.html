<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacy Parcels - Contact Us</title>

    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mulish', sans-serif;
        }

        body {
            background-color: #F6F1F1;
            color: #4A4E69;
        }

        header {
            padding: 30px;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #B5838D, #9A8C98);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
            color: #4A4E69;
        }

        nav a:hover {
            color: #B5838D;
        }

        .contact-section {
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .contact-box h1 {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
        }

        .contact-box input,
        .contact-box textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .contact-box textarea {
            resize: none;
            height: 120px;
        }

        .contact-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #B5838D;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .contact-box button:hover {
            background: #6D6875;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #F6F1F1;
        }
    </style>
</head>

<body>

    <header>
        <a href="home.html" class="logo">Pacy Parcels</a>
        <nav>
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="delivery.html">Delivery</a>
            <a href="test.html">Contact</a>
        </nav>
    </header>

    <section class="contact-section">
        <div class="contact-box">
            <h1>Contact Us</h1>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Pacy Parcels. All rights reserved.</p>
    </footer>

</body>
</html>
